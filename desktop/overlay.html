<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskFlow Alert</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-app-region: no-drag;
      }

      #root {
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        padding: 24px;
        pointer-events: none;
      }
      #root.visible { display: flex; }

      #root.mode-alert {
        background: rgba(2, 6, 23, 0.88);
        backdrop-filter: blur(14px) saturate(1.2);
      }

      .countdown-vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 40%, rgba(239, 68, 68, 0.22) 0%, transparent 55%),
          radial-gradient(circle at 50% 100%, rgba(249, 115, 22, 0.12) 0%, transparent 45%);
      }

      .countdown-card {
        position: relative;
        z-index: 1;
        display: flex;
        width: min(100%, 380px);
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 28px 24px 22px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background:
          linear-gradient(165deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%),
          rgba(15, 23, 42, 0.72);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        animation: card-enter 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) both;
        text-align: center;
      }

      .countdown-card.urgent {
        border-color: rgba(248, 113, 113, 0.45);
        animation: card-enter 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) both, card-shake 0.4s ease-in-out infinite;
      }

      .countdown-card-glow {
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.35), rgba(249, 115, 22, 0.15), rgba(239, 68, 68, 0.25));
        opacity: 0.55;
        z-index: -1;
        filter: blur(12px);
      }

      .countdown-eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
      }

      .countdown-title {
        margin-top: 8px;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #fff;
        text-shadow: 0 2px 12px rgba(239, 68, 68, 0.35);
      }

      .countdown-subtitle {
        margin-top: 6px;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.55);
      }

      .countdown-ring-wrap {
        position: relative;
        display: grid;
        place-items: center;
        width: 220px;
        height: 220px;
      }

      .countdown-ring-svg {
        position: absolute;
        inset: 0;
        transform: rotate(-90deg);
      }

      .countdown-ring-number {
        font-size: clamp(5rem, 22vw, 6.5rem);
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        color: #fff;
        text-shadow:
          0 0 40px rgba(255, 255, 255, 0.45),
          0 0 80px rgba(239, 68, 68, 0.35);
        animation: number-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .countdown-ring-number.urgent {
        color: #fca5a5;
        animation: number-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, number-glow 0.8s ease-in-out infinite;
      }

      .countdown-steps {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .countdown-step {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.06);
        font-size: 14px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.35);
        transition: all 0.25s ease;
      }

      .countdown-step.past {
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.2);
        transform: scale(0.88);
      }

      .countdown-step.active {
        border-color: rgba(252, 165, 165, 0.85);
        background: linear-gradient(145deg, rgba(239, 68, 68, 0.35), rgba(249, 115, 22, 0.25));
        color: #fff;
        transform: scale(1.08);
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.45);
      }

      .countdown-footer {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
      }

      .countdown-card.urgent .countdown-footer {
        color: rgba(252, 165, 165, 0.85);
      }

      .bell-icon {
        width: 56px;
        height: 56px;
        margin-bottom: 4px;
        animation: bell-bounce 0.55s ease-in-out infinite;
        filter: drop-shadow(0 6px 20px rgba(239, 68, 68, 0.55));
      }

      @keyframes card-enter {
        from { opacity: 0; transform: scale(0.88) translateY(16px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes card-shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-2px); }
        75% { transform: translateX(2px); }
      }
      @keyframes number-pop {
        0% { transform: scale(0.2); opacity: 0; }
        60% { transform: scale(1.12); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes number-glow {
        0%, 100% { text-shadow: 0 0 40px rgba(255,255,255,0.5), 0 0 80px rgba(239,68,68,0.3); }
        50% { text-shadow: 0 0 80px rgba(255,255,255,0.9), 0 0 140px rgba(239,68,68,0.6); }
      }
      @keyframes bell-bounce {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-10px) scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="countdown-vignette" aria-hidden></div>
      <div id="alert-view" class="countdown-card">
        <div class="countdown-card-glow" aria-hidden></div>
        <svg class="bell-icon" viewBox="0 0 44 46" aria-hidden>
          <path d="M22 4 L22 8" stroke="#fca5a5" stroke-width="3" stroke-linecap="round" fill="none"/>
          <path d="M8 34 L36 34 Q34 14 22 12 Q10 14 8 34 Z" fill="#ef4444"/>
          <circle cx="16" cy="24" r="2.5" fill="#fff"/>
          <circle cx="28" cy="24" r="2.5" fill="#fff"/>
          <ellipse cx="22" cy="29" rx="3" ry="2.5" fill="#0f172a"/>
        </svg>
        <div class="countdown-eyebrow">Focus cycle complete</div>
        <div class="countdown-title" id="title">Time for a break</div>
        <div class="countdown-subtitle">11-minute session finished</div>

        <div class="countdown-ring-wrap">
          <svg class="countdown-ring-svg" viewBox="0 0 128 128" aria-hidden>
            <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fb923c"/>
                <stop offset="50%" stop-color="#ef4444"/>
                <stop offset="100%" stop-color="#f97316"/>
              </linearGradient>
            </defs>
            <circle cx="64" cy="64" r="54" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="9"/>
            <circle id="ring-progress" cx="64" cy="64" r="54" fill="none" stroke="url(#ringGrad)" stroke-width="9" stroke-linecap="round"/>
          </svg>
          <div class="countdown-ring-number" id="count">3</div>
        </div>

        <div class="countdown-steps" id="steps">
          <span class="countdown-step" data-step="3">3</span>
          <span class="countdown-step" data-step="2">2</span>
          <span class="countdown-step" data-step="1">1</span>
        </div>

        <div class="countdown-footer" id="sub">Resuming in 3 seconds</div>
      </div>
    </div>

    <script>
      let countdownStart = 3;
      let alertIntervalMinutes = 11;
      const root = document.getElementById("root");
      const card = document.getElementById("alert-view");
      const countEl = document.getElementById("count");
      const titleEl = document.getElementById("title");
      const subEl = document.getElementById("sub");
      const ringProgress = document.getElementById("ring-progress");
      const stepsContainer = document.getElementById("steps");
      let stepEls = [];

      const circumference = 2 * Math.PI * 54;
      ringProgress.style.strokeDasharray = String(circumference);

      function rebuildSteps(start) {
        stepsContainer.innerHTML = "";
        for (let i = start; i >= 1; i -= 1) {
          const span = document.createElement("span");
          span.className = "countdown-step";
          span.dataset.step = String(i);
          span.textContent = String(i);
          stepsContainer.appendChild(span);
        }
        stepEls = Array.from(stepsContainer.querySelectorAll(".countdown-step"));
      }

      rebuildSteps(countdownStart);

      function updateRing(countdown) {
        const progress = countdownStart > 0 ? (countdown / countdownStart) * 100 : 0;
        const offset = circumference - (progress / 100) * circumference;
        ringProgress.style.strokeDashoffset = String(offset);
      }

      function updateSteps(countdown) {
        stepEls.forEach((el) => {
          const step = Number(el.dataset.step);
          el.classList.remove("active", "past");
          if (step === countdown) el.classList.add("active");
          else if (step > countdown) el.classList.add("past");
        });
      }

      function showAlert(countdown) {
        root.className = "visible mode-alert";
        const urgent = countdown <= Math.min(2, countdownStart);

        card.classList.toggle("urgent", urgent);
        countEl.textContent = countdown;
        countEl.className = "countdown-ring-number" + (urgent ? " urgent" : "");
        countEl.style.animation = "none";
        void countEl.offsetWidth;
        countEl.style.animation = "";

        titleEl.textContent = urgent ? "Break alert!" : "Time for a break";
        subEl.textContent = urgent
          ? "Resuming now"
          : "Resuming in " + countdown + " second" + (countdown !== 1 ? "s" : "");

        updateRing(countdown);
        updateSteps(countdown);
      }

      function hide() {
        root.className = "";
      }

      if (window.electronOverlay) {
        window.electronOverlay.onUpdate((data) => {
          if (data.mode === "hidden" || !data.visible) {
            hide();
            return;
          }
          if (data.mode === "alert") {
            if (data.countdownStart && data.countdownStart !== countdownStart) {
              countdownStart = data.countdownStart;
              rebuildSteps(countdownStart);
            }
            if (data.alertIntervalMinutes) {
              alertIntervalMinutes = data.alertIntervalMinutes;
            }
            showAlert(data.countdown);
          }
        });
      }
    </script>
  </body>
</html>
